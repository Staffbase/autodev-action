name: Continuous Integration

on:
  pull_request:
  push:
    branches:
      - 'main'
      - 'releases/*'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4

      - name: Install Dependencies
        run: mise run install

      - name: Build Action
        run: mise run all

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Execute Action
        uses: ./
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: ${{ secrets.DEV_PUSH_USER }}
          labels: true
          comments: true

  dependabot:
    needs: [build, test]
    uses: Staffbase/gha-workflows/.github/workflows/template_automerge_dependabot.yml@7433384f8737623f2c8eb247427830629ce66d97 # v14.1.0
    with:
      force: true
    secrets:
      client-id: ${{ vars.STAFFBASE_ACTIONS_CLIENT_ID }}
      private_key: ${{ secrets.STAFFBASE_ACTIONS_PRIVATE_KEY }}
